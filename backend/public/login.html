<!DOCTYPE html>
<html>
<head>
    <title>House Party - Login</title>
    <style>
        body { font-family: 'Bree' serif'; margin: 2rem; }
        .container { max-width: 300px; margin: auto; }
        input, button { width: 100%; padding: 8px; margin: 5px 0; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login to House Party</h2>
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="login()">Login</button>
        <div id="message" style="color: red; margin-top: 10px;"></div>
    </div>
    <script>
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');
        messageDiv.innerText = '';

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            console.log('Login response:', data);   // <-- log the response

            if (response.ok) {
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    messageDiv.innerText = 'No token received from server.';
                }
            } else {
                messageDiv.innerText = data.error || 'Login failed';
            }
        } catch (err) {
            console.error(err);
            messageDiv.innerText = 'Network error. Is the backend running?';
        }
    }
</script>
</body>
</html>
