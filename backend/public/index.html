<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Party - Volunteer Shifts</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .logout { margin-bottom: 1rem; text-align: right; }
        button { padding: 6px 12px; background-color: #f44336; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #d32f2f; }
        .error { color: red; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="logout">
        <button onclick="logout()">Logout</button>
    </div>
    <h1>🏠 House Party – Upcoming Volunteer Shifts</h1>
    <div id="error-message" class="error"></div>
    <table id="shifts-table">
        <thead>
            <tr><th>Date</th><th>Start</th><th>End</th><th>Role</th><th>Capacity</th><th>Location</th></tr>
        </thead>
        <tbody id="shifts-body">
            <tr><td colspan="6">Loading shifts...</td</tr>
        </tbody>
    </table>

    <script>
        async function loadShifts() {
            const token = localStorage.getItem('token');
            const errorDiv = document.getElementById('error-message');
            errorDiv.innerText = '';

            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            try {
                const response = await fetch('/api/shifts', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401 || response.status === 403) {
                    localStorage.removeItem('token');
                    window.location.href = '/login.html';
                    return;
                }

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const shifts = data.shifts || [];

                const tbody = document.getElementById('shifts-body');
                tbody.innerHTML = '';

                if (shifts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No shifts found.</td></tr>';
                    return;
                }

                for (const shift of shifts) {
                    const row = tbody.insertRow();
                    row.insertCell().textContent = shift.date;
                    row.insertCell().textContent = shift.start_time;
                    row.insertCell().textContent = shift.end_time;
                    row.insertCell().textContent = shift.role;
                    row.insertCell().textContent = shift.capacity;
                    row.insertCell().textContent = shift.location || '';
                }
            } catch (error) {
                console.error('Error fetching shifts:', error);
                errorDiv.innerText = `Error loading shifts: ${error.message}`;
                document.getElementById('shifts-body').innerHTML = '<tr><td colspan="6">Failed to load shifts. Check console for details.</td></tr>';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        loadShifts();
    </script>
</body>
</html>
