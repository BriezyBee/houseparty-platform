<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Party - Volunteer Shifts</title>
    <style>
        body { font-family: 'Bree' serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>🏠 House Party – Upcoming Volunteer Shifts</h1>
    <table id="shifts-table">
        <thead>
            <tr><th>Date</th><th>Start</th><th>End</th><th>Role</th><th>Capacity</th><th>Location</th></tr>
        </thead>
        <tbody id="shifts-body">
            <tr><td colspan="6">Loading shifts...</td></tr>
        </tbody>
    </table>

    <script>
        async function loadShifts() {
            try {
                const response = await fetch('http://localhost:3001/api/shifts');
                const data = await response.json();
                const shifts = data.shifts;
                const tbody = document.getElementById('shifts-body');
                tbody.innerHTML = '';
                if (shifts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No shifts found.</td></tr>';
                    return;
                }
                for (const shift of shifts) {
                    const row = tbody.insertRow();
                    row.insertCell().textContent = shift.date;
                    row.insertCell().textContent = shift.start_time;
                    row.insertCell().textContent = shift.end_time;
                    row.insertCell().textContent = shift.role;
                    row.insertCell().textContent = shift.capacity;
                    row.insertCell().textContent = shift.location || '';
                }
            } catch (error) {
                console.error('Error fetching shifts:', error);
                document.getElementById('shifts-body').innerHTML = '<tr><td colspan="6">Error loading shifts. Make sure the backend is running.</td></tr>';
            }
        }
        loadShifts();
    </script>
</body>
</html>
